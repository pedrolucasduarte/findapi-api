services:
  findapi-postgres:
    image: postgres:17.10
    container_name: findapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-findapi}
      POSTGRES_USER: ${POSTGRES_USER:-findapi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - findapi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-findapi_user} -d ${POSTGRES_DB:-findapi}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  findapi-postgres-data:
